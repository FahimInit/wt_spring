<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Character Counter</title>

<style>
.input_area{
    text-align: center;
}
textarea{
    border: 2px solid #000;
    width: 90%;
    height: 200px;
    background: grey;
    display: inline-block;
    border-radius: 10px;
    padding: 8px;
    font-size: 16px;
    margin-bottom: 10px;
    box-shadow: 1px 1px 3px gray;
}
textarea:focus{
    outline: none;
}
::-webkit-input-placeholder{
    color: #000;
}
.btn_area{
    text-align: center;
}
button{
    height: 60px;
    width: 150px;
    border: 2px solid #000;
    background: #000;
    color: #fff;
    display: inline-block;
    border-radius: 10px;
    margin-bottom: 7px;
    font-size: 18px;
    box-shadow: 1px 1px 3px grey;
    cursor: pointer;
}
.output{
    text-align: center;
}
.result {
    font-family: sans-serif;
    background: #000;
    color: #fff;
    padding: 15px;
    font-size: 18px;
    border-radius: 10px;
    text-align: center;
    display: inline-block;
    visibility: hidden;
    max-width: 90%;
    word-wrap: break-word;
}
</style>
</head>
<body>
    <div class="input_area">
        <textarea class="input" placeholder="Enter your text"></textarea>
    </div>
    <div class="btn_area">
        <button class="btn">
            Analyze Text
        </button>
        <br>
        <button class="reset">
            Reset
        </button>
    </div>
    <div class="output">
        <div class="result"></div>
    </div>

<script>
    const input = document.querySelector(".input");
    const output = document.querySelector(".result");
    const btn = document.querySelector(".btn");
    const reset = document.querySelector(".reset");

    btn.addEventListener("click", function(){
        const text = input.value;

        if(text.trim() === ""){
            output.innerHTML = "Please enter some text to analyze.";
            output.style.visibility = "visible";
            return;
        }

        const charCount = text.length;
        const wordsArray = text.trim().split(/\s+/);
        let wordCount;

        if(wordsArray[0] === 0){
            wordCount = 0;
        }else{
            wordCount = wordsArray.length;
        }

        const reversedText = text.split("").reverse().join("");

        output.innerHTML = `
            <strong>Total Characters:</strong> ${charCount} <br><br>
            <strong>Total Words:</strong> ${wordCount} <br><br>
            <strong>Reversed Text:</strong> <br> 
            <p style="font-size: 14px"> ${reversedText} </p> 
        `;

        output.style.visibility = "visible";
    });

    reset.addEventListener("click", function(){
        input.value = "";
        output.style.visibility = "hidden";
        output.innerHTML = "";
    });
</script>
</body>
</html>
